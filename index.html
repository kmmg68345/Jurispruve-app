<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurispruve | Forensic Integrity Protocol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .logo-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; display: inline-block; margin-bottom: 20px; border: 1px solid #30363d; }
        h1 { margin: 10px 0 5px 0; letter-spacing: 2px; color: #fff; }
        .subtitle { color: #8b949e; margin-bottom: 30px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Notes Area */
        .notes-area { text-align: left; margin-bottom: 20px; }
        label { font-size: 0.75rem; color: var(--primary); font-weight: bold; }
        textarea { width: 100%; background: var(--card); border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 8px; margin-top: 5px; box-sizing: border-box; resize: vertical; min-height: 80px; }

        /* Drop Zone */
        .drop-zone { border: 2px dashed #30363d; border-radius: 12px; padding: 40px; cursor: pointer; transition: all 0.3s; background: var(--card); }
        .drop-zone:hover { border-color: var(--primary); background: #1c2128; }
        
        /* Success Elements */
        .success-seal { width: 60px; height: 60px; border: 3px solid var(--primary); border-radius: 50%; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 30px; animation: seal-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        @keyframes seal-pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-download { background: var(--primary); color: #000; border: none; padding: 15px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-download:hover { background: #00e57a; }

        /* History */
        #history-container { margin-top: 40px; text-align: left; }
        .history-item { background: var(--card); padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 3px solid var(--primary); display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="jurispruve-dark-transparent.svg" alt="Jurispruve Logo" style="height: 60px;">
        </div>
        <h1>JURISPRUVE</h1>
        <div class="subtitle">Digital Evidence Integrity Protocol</div>

        <div class="notes-area">
            <label>CASE NOTES / CHAIN OF CUSTODY:</label>
            <textarea id="caseNotes" placeholder="e.g., Received from Client Jane Doe via encrypted portal. Case #2026-004."></textarea>
        </div>

        <div id="drop-zone" class="drop-zone">
            <p id="status">Drag & Drop Evidence to Seal</p>
            <input type="file" id="evidenceInput" style="display: none;">
        </div>
        
        <div id="result"></div>

        <div id="history-container" style="display: none;">
            <h3 style="font-size: 0.8rem; color: #8b949e; border-bottom: 1px solid #30363d; padding-bottom: 10px;">SESSION LOG</h3>
            <div id="history-list"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
