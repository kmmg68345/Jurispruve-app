<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurispruve | Judicial Forensic Terminal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --judicial-blue: #1a2b48; --gold: #c5a059; --ivory: #f8f9fa; --border: #d1d5db; --seal-red: #800000; }
        body { font-family: 'Georgia', serif; background-color: #e5e7eb; color: var(--judicial-blue); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 900px; width: 100%; background: var(--ivory); padding: 40px; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--judicial-blue); position: relative; }
        
        .header { border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 25px; text-align: center; }
        h1 { font-size: 32px; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .intake-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; margin-bottom: 20px; }
        .full-width { grid-column: span 2; }
        label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: var(--judicial-blue); margin-bottom: 4px; display: block; }
        input, textarea, select { width: 100%; border: 1px solid var(--border); padding: 10px; font-family: 'Times New Roman', serif; font-size: 14px; box-sizing: border-box; background: white; }
        
        /* Drop Zone Styling */
        .drop-zone { border: 2px double var(--border); padding: 60px; cursor: pointer; background: #fff; text-align: center; transition: 0.3s; margin-top: 20px; position: relative; }
        .drop-zone.dragover { border-color: var(--gold); background: #fcfaf5; transform: scale(1.01); }
        
        .btn-master { background: var(--gold); color: white; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; border-radius: 2px; }
        .btn-master:hover { background: #b08d4a; }

        #history-container { margin-top: 30px; border-top: 2px solid var(--gold); padding-top: 20px; display: none; }
        .history-item { background: white; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        #qrcode { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Jurispruve</h1>
        <div style="font-size: 11px; font-weight: bold; color: #666;">OFFICIAL JUDICIAL INTAKE & FORENSIC FILING TERMINAL</div>
        <div id="timeSync" style="font-size: 10px; margin-top: 10px; color: var(--gold); font-weight: bold;">📡 ATTEMPTING ATOMIC TIME SYNC...</div>
    </div>

    <div class="intake-grid" style="background: rgba(26, 43, 72, 0.03); padding: 20px; border: 1px solid #d1d5db;">
        <div class="full-width">
            <label>Official Firm Logo / Clerk Stamp (Upload)</label>
            <input type="file" id="logoInput" accept="image/*" style="border:none; padding:0; background:transparent;">
        </div>
        <div class="full-width"><label>Jurisdiction (Court Name)</label><input type="text" id="courtName" placeholder="e.g. IN THE CIRCUIT COURT OF THE 11TH JUDICIAL CIRCUIT"></div>
        <div><label>Plaintiff(s)</label><input type="text" id="plaintiff" placeholder="Name(s)"></div>
        <div><label>Defendant(s)</label><input type="text" id="defendant" placeholder="Name(s)"></div>
        <div><label>Case Number</label><input type="text" id="caseID" placeholder="Matter/Index ID"></div>
        <div><label>Custodian / Lead Investigator</label><input type="text" id="custodian" placeholder="Full Name & Bar #"></div>
        <div class="full-width">
            <label>Protective Order Watermark</label>
            <select id="watermarkType">
                <option value="">PUBLIC FILING (NO WATERMARK)</option>
                <option value="CONFIDENTIAL">CONFIDENTIAL</option>
                <option value="FILED UNDER SEAL">FILED UNDER SEAL</option>
                <option value="ATTORNEYS EYES ONLY">ATTORNEYS' EYES ONLY</option>
            </select>
        </div>
    </div>

    <div class="intake-grid" style="border: 1px solid var(--border); padding: 20px; border-top: none; background: #fff;">
        <div class="full-width"><label>Service List (Opposing Counsel Details)</label><textarea id="serviceList" rows="2" placeholder="Recipient names, addresses, and emails..."></textarea></div>
        <div><label>Method of Service</label><input type="text" id="serviceMethod" placeholder="e.g. E-Filing Portal"></div>
        <div><label>Date of Service</label><input type="date" id="serviceDate"></div>
    </div>

    <div id="drop-zone" class="drop-zone">
        <p id="status" style="font-weight: bold; font-size: 16px;">DRAG EVIDENCE TO APPLY INTEGRITY SEAL</p>
        <p style="font-size: 11px; color: #666;">(Files are processed locally. Zero-Knowledge Protocol Active.)</p>
        <input type="file" id="evidenceInput" style="display: none;" multiple>
    </div>

    <div id="history-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="font-size:14px; margin:0; text-transform: uppercase;">Active Exhibit Ledger</h3>
            <button onclick="generateCoverSheet()" class="btn-master">Generate Court Filing Index</button>
        </div>
        <div id="history-list"></div>
    </div>
    
    <div id="qrcode"></div>
</div>

<script>
/** * JURISPRUVE CORE LOGIC 
 * Merged into Single File for GitHub Deployment
 */

let verifiedTime = new Date().toUTCString();
let sessionLog = [];
let uploadedLogo = null;

document.addEventListener('DOMContentLoaded', () => {
    syncTime();
    setupDropZone();
});

// 1. ATOMIC TIME SYNC
async function syncTime() {
    try {
        const response = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
        const data = await response.json();
        verifiedTime = new Date(data.utc_datetime).toUTCString();
        document.getElementById('timeSync').innerText = `✅ ATOMIC TIME VERIFIED: ${verifiedTime}`;
    } catch (e) { 
        document.getElementById('timeSync').innerText = "⚠️ OFFLINE: USING LOCAL SYSTEM CLOCK"; 
    }
}

// 2. STAMP UPLOADER
document.getElementById('logoInput').onchange = e => {
    const reader = new FileReader();
    reader.onload = (event) => { uploadedLogo = event.target.result; };
    reader.readAsDataURL(e.target.files[0]);
};

// 3. BULLETPROOF DRAG & DROP
function setupDropZone() {
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('evidenceInput');

    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) processFiles(e.target.files);
    });

    ['dragover', 'dragenter'].forEach(name => {
        dropZone.addEventListener(name, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add('dragover');
        });
    });

    ['dragleave', 'drop'].forEach(name => {
        dropZone.addEventListener(name, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('dragover');
        });
    });

    dropZone.addEventListener('drop', (e) => {
        const files = e.dataTransfer.files;
        if (files.length > 0) processFiles(files);
    });
}

// 4. FORENSIC HASHING (SHA-256)
async function processFiles(files) {
    for (let file of files) {
        document.getElementById('status').innerText = `Processing: ${file.name}...`;
        
        const arrayBuffer = await file.arrayBuffer();
        const hashBuffer = await crypto.subtle.digest("SHA-256", arrayBuffer);
        const hashHex = Array.from(new Uint8Array(hashBuffer))
                        .map(b => b.toString(16).padStart(2, '0'))
                        .join('');
        
        const data = {
            name: file.name,
            hash: hashHex,
            size: (file.size / 1024).toFixed(2) + " KB",
            exhibit: `EX-${100 + sessionLog.length + 1}`,
            timestamp: verifiedTime
        };
        
        sessionLog.push(data);
        addToList(data);
    }
    document.getElementById('status').innerText = "Intake Complete. Ready for Pleading.";
    document.getElementById('history-container').style.display = 'block';
}

function addToList(d) {
    const list = document.getElementById('history-list');
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
        <span><strong>${d.exhibit}</strong>: ${d.name}</span>
        <span style="font-family:monospace; font-size:10px; color:#666;">${d.hash.substring(0,32)}...</span>
    `;
    list.prepend(item);
}

// 5. JUDICIAL PDF GENERATOR
function generateCoverSheet() {
    const court = document.getElementById('courtName').value.toUpperCase() || "IN THE COURT OF RECORD";
    const cid = document.getElementById('caseID').value || "PENDING";
    const p = document.getElementById('plaintiff').value || "PLAINTIFF";
    const d = document.getElementById('defendant').value || "DEFENDANT";
    const watermark = document.getElementById('watermarkType').value;
    const custodian = document.getElementById('custodian').value || "AUTHORIZED AGENT";

    const logoHtml = uploadedLogo ? `<img src="${uploadedLogo}" style="width: 140px; position: absolute; top: 0; right: 0; z-index:10;">` : '';
    const watermarkHtml = watermark ? `<div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 70px; color: rgba(197, 160, 89, 0.12); font-weight: bold; z-index: 0; white-space: nowrap; pointer-events: none; text-align: center; width: 100%;">${watermark}</div>` : '';

    const content = `
        <div style="padding: 50px; font-family: 'Times New Roman', serif; background: #fff; color: black; line-height: 1.4; position: relative; overflow: hidden; min-height: 1050px; border: 1px solid #eee;">
            ${watermarkHtml}
            <div style="position: absolute; top: 40px; right: 50px;">${logoHtml}</div>
            
            <div style="text-align: center; font-weight: bold; font-size: 14px; margin-bottom: 30px; padding-right: 160px;">${court}</div>
            
            <div style="display: flex; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
                <div style="width: 55%; border-right: 2px solid #000; padding-right: 20px;">
                    <p style="margin:0;">${p},</p>
                    <p style="margin:10px 0 10px 40px; font-style:italic;">Plaintiff / Petitioner,</p>
                    <p style="margin:0;">v.</p>
                    <p style="margin:10px 0;">${d},</p>
                    <p style="margin:10px 0 0 40px; font-style:italic;">Defendant / Respondent.</p>
                </div>
                <div style="width: 45%; padding-left: 20px;">
                    <p style="margin:0;">Case No.: <strong>${cid}</strong></p>
                    <p style="margin:20px 0 0 0; font-weight:bold; text-decoration:underline; font-size: 13px;">NOTICE OF FILING EXHIBIT INDEX</p>
                </div>
            </div>

            <p style="font-size: 13px;">The undersigned certifies that the following items were processed via <strong>SHA-256 Cryptographic Protocol (NIST FIPS 180-4)</strong> and are bit-for-bit identical to source evidence:</p>
            
            <table style="width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 15px; border: 1px solid #000;">
                <tr style="background: #f0f0f0; border-bottom: 1px solid #000;">
                    <th style="padding: 8px; text-align: left;">EXHIBIT</th>
                    <th style="padding: 8px; text-align: left;">FILE NAME</th>
                    <th style="padding: 8px; text-align: left;">SHA-256 DIGITAL FINGERPRINT</th>
                </tr>
                ${sessionLog.map(i => `<tr style="border-bottom: 1px solid #eee;"><td style="padding:8px; font-weight:bold;">${i.exhibit}</td><td style="padding:8px;">${i.name}</td><td style="padding:8px; font-family:monospace;">${i.hash}</td></tr>`).join('')}
            </table>

            <div style="margin-top: 40px; page-break-before: always; border-top: 4px double var(--judicial-blue); padding-top: 30px;">
                <h3 style="text-align: center; text-decoration: underline; font-size: 16px;">CERTIFICATE OF SERVICE</h3>
                <p style="font-size: 13px; margin-top: 20px;">I HEREBY CERTIFY that a true copy of the foregoing has been served via <strong>${document.getElementById('serviceMethod').value || 'Electronic Service'}</strong> on ${document.getElementById('serviceDate').value || new Date().toLocaleDateString()} to:</p>
                <div style="background: #f9f9f9; padding: 20px; font-size: 12px; white-space: pre-wrap; border: 1px solid #ddd; margin-bottom: 50px;">${document.getElementById('serviceList').value || 'PARTIES LISTED IN DISCOVERY'}</div>
                
                <div style="margin-top: 80px;">
                    <div style="border-bottom: 1.5px solid #000; width: 300px; height: 30px;"></div>
                    <p style="font-size: 12px; font-weight: bold; margin-top: 8px;">${custodian.toUpperCase()}</p>
                    <p style="font-size: 10px;">Custodian of Digital Evidence / Authorized Signatory</p>
                </div>
                <div style="text-align: right; font-size: 8px; color: #999; margin-top: 20px;">
                    Security ID: ${Math.random().toString(36).substr(2, 9).toUpperCase()} | Timestamp: ${verifiedTime}
                </div>
            </div>
        </div>`;

    html2pdf().from(content).set({ 
        margin: 0.5, 
        filename: `Forensic_Index_${cid}.pdf`,
        html2canvas: { scale: 3, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    }).save();
}
</script>

</body>
</html>
