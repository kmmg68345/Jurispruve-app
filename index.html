<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurispruve | Forensic Integrity Workstation</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>

    <style>
        :root { --primary: #00ff88; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --error: #ff4444; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 650px; width: 100%; text-align: center; }
        
        /* Branding & Navigation */
        .logo-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #30363d; }
        .nav-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .tab-btn { padding: 10px 25px; border-radius: 25px; border: 1px solid #30363d; cursor: pointer; font-weight: bold; transition: 0.3s; background: var(--card); color: white; }
        .tab-btn.active { background: var(--primary); color: black; border-color: var(--primary); }

        /* UI Elements */
        .notes-area { text-align: left; margin-bottom: 20px; }
        textarea, input[type="text"] { width: 100%; background: var(--card); border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 8px; margin-top: 5px; box-sizing: border-box; }
        .drop-zone { border: 2px dashed #30363d; border-radius: 12px; padding: 50px; cursor: pointer; background: var(--card); transition: 0.3s; }
        .drop-zone:hover { border-color: var(--primary); background: #1c2128; }
        
        /* Result Animations */
        .success-seal { width: 60px; height: 60px; border: 3px solid var(--primary); border-radius: 50%; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 30px; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        .btn-action { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        
        /* History Log */
        .history-item { background: var(--card); padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 3px solid var(--primary); text-align: left; display: flex; justify-content: space-between; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="jurispruve-dark-transparent.svg" alt="Jurispruve Logo" style="height: 60px;">
        </div>
        <h1 style="margin:0; color:white; letter-spacing:1px;">JURISPRUVE</h1>
        <p style="color:#8b949e; font-size:0.8rem; text-transform:uppercase; margin-bottom:25px;">Forensic Integrity Workstation</p>

        <div class="nav-tabs">
            <button id="btnSeal" class="tab-btn active" onclick="switchMode('seal')">Seal New Evidence</button>
            <button id="btnVerify" class="tab-btn" onclick="switchMode('verify')">Verify Existing Report</button>
        </div>

        <div id="sealInputs" class="notes-area">
            <label style="color:var(--primary); font-size: 0.75rem; font-weight: bold;">CHAIN OF CUSTODY NOTES:</label>
            <textarea id="caseNotes" placeholder="e.g., Received from Defense Counsel via encrypted link. Case #2026-04."></textarea>
        </div>

        <div id="verifyInputs" class="notes-area" style="display:none;">
            <label style="color:var(--primary); font-size: 0.75rem; font-weight: bold;">PASTE HASH FROM CERTIFICATE:</label>
            <input type="text" id="targetHash" placeholder="Enter the 64-character SHA-256 hash...">
        </div>

        <div id="drop-zone" class="drop-zone">
            <p id="status">Drag & Drop Evidence File</p>
            <input type="file" id="evidenceInput" style="display: none;">
        </div>

        <div id="result"></div>

        <div id="history-container" style="display: none; margin-top: 40px; text-align: left;">
            <h3 style="font-size: 0.8rem; color: #8b949e; border-bottom: 1px solid #30363d; padding-bottom: 10px;">SESSION LOG</h3>
            <div id="history-list"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
