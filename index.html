<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurispruve | Evidence Intake</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        #app { width: 400px; text-align: center; }
        #drop-zone { border: 2px dashed #30363d; padding: 40px; border-radius: 12px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-download { background: #00ff88; color: black; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Jurispruve</h1>
        <p style="color: #8b949e;">Rule 901(c) Integrity Protocol</p>

        <div id="drop-zone">
            <p id="drop-text">Drag evidence here or <br><strong>click to browse</strong></p>
            <input type="file" id="evidenceInput" style="display: none;">
        </div>

        <div id="status" style="margin-top: 20px; color: #8b949e;">System Ready</div>
        <div id="result"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
