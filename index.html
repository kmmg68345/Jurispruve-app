<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurispruve | Judicial Forensic Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --judicial-blue: #1a2b48; --gold: #c5a059; --ivory: #f8f9fa; --border: #d1d5db; --seal-red: #800000; }
        body { font-family: 'Georgia', serif; background-color: #e5e7eb; color: var(--judicial-blue); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 900px; width: 100%; background: var(--ivory); padding: 40px; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--judicial-blue); }
        
        .header { border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 25px; text-align: center; }
        h1 { font-size: 32px; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .intake-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; margin-bottom: 20px; }
        .full-width { grid-column: span 2; }
        label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: var(--judicial-blue); margin-bottom: 4px; display: block; }
        input, textarea, select { width: 100%; border: 1px solid var(--border); padding: 10px; font-family: 'Times New Roman', serif; font-size: 14px; box-sizing: border-box; background: white; }
        
        .drop-zone { border: 2px double var(--border); padding: 50px; cursor: pointer; background: #fff; text-align: center; transition: 0.3s; margin-top: 20px; }
        .drop-zone:hover { border-color: var(--gold); background: #fcfaf5; }
        
        .btn-master { background: var(--judicial-blue); color: white; border: none; padding: 15px 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; width: 100%; margin-top: 20px; }
        .btn-secondary { background: var(--gold); color: white; border: none; padding: 8px 15px; cursor: pointer; font-size: 11px; font-weight: bold; }
        
        #history-list { margin-top: 20px; border-top: 1px solid var(--border); }
        .history-item { background: white; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        #qrcode { display: none; }
        .watermark-indicator { color: var(--seal-red); font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Jurispruve</h1>
        <div style="font-size: 11px; font-weight: bold; color: #666;">OFFICIAL JUDICIAL INTAKE & FORENSIC FILING TERMINAL</div>
        <div id="timeSync" style="font-size: 9px; margin-top: 10px; color: var(--gold);">📡 SYNCING WITH ATOMIC CLOCK...</div>
    </div>

    <div class="intake-grid" style="background: rgba(26, 43, 72, 0.03); padding: 20px; border: 1px solid #d1d5db;">
        <div class="full-width">
            <label>Official Firm / Clerk Logo (Stamp)</label>
            <input type="file" id="logoInput" accept="image/*" style="font-size: 11px; border: none; padding: 0;">
        </div>
        <div class="full-width"><label>Jurisdiction / Court Name</label><input type="text" id="courtName" placeholder="e.g. IN THE SUPREME COURT OF THE STATE OF NEW YORK"></div>
        <div><label>Plaintiff(s)</label><input type="text" id="plaintiff" placeholder="John Doe, et al."></div>
        <div><label>Defendant(s)</label><input type="text" id="defendant" placeholder="Corporation X, et al."></div>
        <div><label>Case / Matter ID</label><input type="text" id="caseID" placeholder="Index No. 2026-CV-000"></div>
        <div><label>Custodian / Investigator</label><input type="text" id="custodian" placeholder="Full Name & Bar #"></div>
        <div class="full-width">
            <label>Watermark Status (Protective Order)</label>
            <select id="watermarkType">
                <option value="">PUBLIC RECORD (NO WATERMARK)</option>
                <option value="CONFIDENTIAL">CONFIDENTIAL</option>
                <option value="FILED UNDER SEAL">FILED UNDER SEAL</option>
                <option value="ATTORNEYS EYES ONLY">ATTORNEYS' EYES ONLY</option>
            </select>
        </div>
    </div>

    <div class="intake-grid" style="border: 1px solid var(--border); padding: 20px; border-top: none;">
        <div class="full-width"><label>Service List (Opposing Counsel)</label><textarea id="serviceList" rows="2" placeholder="Name, Firm, Address, Email..."></textarea></div>
        <div><label>Service Method</label><input type="text" id="serviceMethod" placeholder="e.g. E-Service Portal"></div>
        <div><label>Service Date</label><input type="date" id="serviceDate"></div>
    </div>

    <div id="drop-zone" class="drop-zone">
        <p id="status" style="font-weight: bold; color: var(--judicial-blue);">DROP EVIDENCE TO GENERATE CERTIFIED HASH</p>
        <input type="file" id="evidenceInput" style="display: none;" multiple>
    </div>

    <div id="result"></div>

    <div id="history-container" style="display:none; margin-top:30px;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid var(--gold); padding-bottom:10px;">
            <h3 style="font-size:14px; margin:0; text-transform: uppercase;">Session Exhibit Ledger</h3>
            <button onclick="generateCoverSheet()" class="btn-secondary">Generate Court Filing Index</button>
        </div>
        <div id="history-list"></div>
    </div>
    
    <div id="qrcode"></div>
</div>

<script>
let verifiedTime = new Date().toUTCString();
let sessionLog = [];
let uploadedLogo = null;

// Time Sync
async function syncTime() {
    try {
        const response = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
        const data = await response.json();
        verifiedTime = new Date(data.utc_datetime).toUTCString();
        document.getElementById('timeSync').innerText = `✅ ATOMIC TIME VERIFIED: ${verifiedTime}`;
    } catch (e) { document.getElementById('timeSync').innerText = "⚠️ LOCAL TIME SYNC (OFFLINE)"; }
}
syncTime();

// Logo Handling
document.getElementById('logoInput').onchange = e => {
    const reader = new FileReader();
    reader.onload = (event) => uploadedLogo = event.target.result;
    reader.readAsDataURL(e.target.files[0]);
};

// Drag & Drop
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('evidenceInput');
dropZone.onclick = () => fileInput.click();
dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#c5a059"; };
dropZone.ondrop = (e) => { e.preventDefault(); processFiles(e.dataTransfer.files); };
fileInput.onchange = (e) => processFiles(e.target.files);

async function processFiles(files) {
    for (let file of files) {
        document.getElementById('status').innerText = `Certifying ${file.name}...`;
        const arrayBuffer = await file.arrayBuffer();
        const hashBuffer = await crypto.subtle.digest("SHA-256", arrayBuffer);
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        
        const data = {
            name: file.name, hash: hashHex, size: (file.size / 1024).toFixed(2) + " KB",
            exhibit: `EX-${100 + sessionLog.length + 1}`,
            timestamp: verifiedTime
        };
        sessionLog.push(data);
        updateUI(data);
    }
    document.getElementById('status').innerText = "Evidence Ingested. Ready for Filing.";
    document.getElementById('history-container').style.display = 'block';
}

function updateUI(d) {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `<span><strong>${d.exhibit}</strong>: ${d.name}</span><span style="font-family:monospace; font-size:10px;">${d.hash.substring(0,16)}...</span>`;
    document.getElementById('history-list').prepend(item);
}

function generateCoverSheet() {
    const court = document.getElementById('courtName').value.toUpperCase() || "IN THE COURT OF RECORD";
    const cid = document.getElementById('caseID').value || "PENDING";
    const watermark = document.getElementById('watermarkType').value;
    const logoHtml = uploadedLogo ? `<img src="${uploadedLogo}" style="width: 140px; position: absolute; top: 0; right: 0;">` : '';
    
    const watermarkHtml = watermark ? `<div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 80px; color: rgba(197, 160, 89, 0.1); font-weight: bold; z-index: 0; white-space: nowrap; pointer-events: none;">${watermark}</div>` : '';

    const content = `
        <div style="padding: 50px; font-family: 'Times New Roman', serif; background: #fff; color: black; line-height: 1.4; position: relative; overflow: hidden; min-height: 1000px;">
            ${watermarkHtml}
            <div style="position: absolute; top: 40px; right: 50px; z-index: 2;">${logoHtml}</div>
            
            <div style="text-align: center; font-weight: bold; font-size: 14px; margin-bottom: 30px; padding-right: 160px;">${court}</div>
            
            <div style="display: flex; border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
                <div style="width: 55%; border-right: 1px solid #000; padding-right: 20px;">
                    <p>${document.getElementById('plaintiff').value || "PLAINTIFF"}, Plaintiff, v. ${document.getElementById('defendant').value || "DEFENDANT"}, Defendant.</p>
                </div>
                <div style="width: 45%; padding-left: 20px;">
                    <p>Case No.: <strong>${cid}</strong></p>
                    <p style="text-decoration: underline; font-weight: bold;">NOTICE OF FILING MASTER EXHIBIT INDEX</p>
                </div>
            </div>

            <p style="font-size: 12px;">The undersigned hereby certifies the integrity of the following digital items via SHA-256 Hashing (NIST FIPS 180-4):</p>
            <table style="width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px;">
                <tr style="background: #f0f0f0; border: 1px solid #000;"><th style="padding: 5px; text-align:left;">ID</th><th style="padding: 5px; text-align:left;">FILE</th><th style="padding: 5px; text-align:left;">SHA-256 HASH</th></tr>
                ${sessionLog.map(i => `<tr style="border-bottom: 1px solid #eee;"><td style="padding:5px;">${i.exhibit}</td><td style="padding:5px;">${i.name}</td><td style="padding:5px; font-family:monospace;">${i.hash}</td></tr>`).join('')}
            </table>

            <div style="margin-top: 40px; page-break-before: always; border-top: 2px solid #000; padding-top: 20px;">
                <h3 style="text-align: center; text-decoration: underline;">CERTIFICATE OF SERVICE</h3>
                <p style="font-size: 12px;">I HEREBY CERTIFY that a copy of the foregoing was served via ${document.getElementById('serviceMethod').value || 'Electronic Service'} on ${document.getElementById('serviceDate').value || new Date().toLocaleDateString()} to:</p>
                <div style="background: #f9f9f9; padding: 15px; font-size: 11px; white-space: pre-wrap; border: 1px solid #ddd;">${document.getElementById('serviceList').value}</div>
                <div style="margin-top: 40px;">
                    <div style="border-bottom: 1px solid #000; width: 250px; height: 30px;"></div>
                    <p style="font-size: 11px; font-weight: bold;">${document.getElementById('custodian').value.toUpperCase() || "AUTHORIZED SIGNATORY"}</p>
                </div>
            </div>
        </div>`;

    html2pdf().from(content).set({ margin: 0.5, filename: `Judicial_Filing_${cid}.pdf`, html2canvas: { scale: 3 } }).save();
}
</script>
</body>
</html>
