<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 80" width="460" height="80">
  <defs>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(4, 10)">
    <line x1="0" y1="0"  x2="52" y2="0"  stroke="#93C5FD" stroke-width="5.5" stroke-linecap="round" opacity="0.95"/>
    <line x1="0" y1="18" x2="64" y2="18" stroke="#60A5FA" stroke-width="4.5" stroke-linecap="round" opacity="0.65"/>
    <line x1="0" y1="36" x2="42" y2="36" stroke="#3B82F6" stroke-width="3.5" stroke-linecap="round" opacity="0.42"/>
    <line x1="0" y1="52" x2="56" y2="52" stroke="#1D4ED8" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
    <circle cx="68" cy="0" r="18" fill="#3B82F6" opacity="0.08"/>
    <circle cx="68" cy="0" r="13" fill="#3B82F6" opacity="0.12" filter="url(#glow)"/>
    <circle cx="68" cy="0" r="8.5" fill="url(#dotGrad)" filter="url(#glow)"/>
    <circle cx="68" cy="0" r="3.5" fill="#0A1628" opacity="0.9"/>
  </g>
  <text x="104" y="52"
    font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
    font-size="50" font-weight="800" letter-spacing="-2" fill="#E8F2FF">juris<tspan font-weight="400" letter-spacing="-1" fill="#60A5FA">pruve</tspan></text>
</svg>
